<!DOCTYPE html>
<html>
<head>
    <title>Date, Range & Step</title>
</head>
<body>

<h2>Date, Range & Step Inputs</h2>

<form>
    <label for="dob">Date of Birth:</label>
    <input type="date" id="dob" name="dob" required><br><br>

    <label for="quantity">Quantity (step=5):</label>
    <input type="number" id="quantity" name="quantity" min="0" max="50" step="5"><br><br>

    <button type="submit">Submit</button>
</form>

</body>
</html>
