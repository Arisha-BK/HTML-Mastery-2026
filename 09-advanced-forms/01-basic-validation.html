<!DOCTYPE html>
<html>
<head>
    <title>Basic Validation</title>
</head>
<body>

<h2>Basic Validation</h2>

<form>
    <label for="username">Username (3-10 chars):</label>
    <input type="text" id="username" name="username" required minlength="3" maxlength="10"><br><br>

    <label for="password">Password (pattern: letters & numbers):</label>
    <input type="password" id="password" name="password" pattern="[A-Za-z0-9]{6,}" required><br><br>

    <button type="submit">Submit</button>
</form>

</body>
</html>
