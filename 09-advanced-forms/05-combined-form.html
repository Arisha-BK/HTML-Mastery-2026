<!DOCTYPE html>
<html>
<head>
    <title>Advanced Combined Form</title>
</head>
<body>

<h2>Full Advanced Form</h2>

<form>
    <fieldset>
        <legend>Personal Info</legend>
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required minlength="3" maxlength="10"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob" required>
    </fieldset><br>

    <fieldset>
        <legend>Account Info</legend>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" pattern="[A-Za-z0-9]{6,}" required><br><br>

        <label for="quantity">Quantity:</label>
        <input type="number" id="quantity" name="quantity" min="0" max="50" step="5">
    </fieldset><br>

    <button type="submit">Submit</button>
</form>

</body>
</html>
