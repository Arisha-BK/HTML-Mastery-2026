<!DOCTYPE html>
<html>
<head>
    <title>Ordered List Type Attribute</title>
</head>
<body>

    <h1>Ordered List with type Attribute</h1>

    <ol type="A">
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ol>

    <ol type="i">
        <li>First</li>
        <li>Second</li>
        <li>Third</li>
    </ol>

</body>
</html>
