<!DOCTYPE html>
<html>
<head>
    <title>Advanced Media</title>
</head>
<body>

    <h2>Advanced Audio & Video</h2>

    <audio controls autoplay loop>
        <source src="audio-example.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <video width="480" height="270" controls autoplay muted loop>
        <source src="video-example.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <h2>Responsive Iframe Example</h2>
    <iframe src="https://www.example.com" width="100%" height="400" title="Example Site">
        Your browser does not support iframes.
    </iframe>

</body>
</html>
